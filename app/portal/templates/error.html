<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080d1a">
  <title>Error — {{ hotel_name|default('Hotel WiFi') }}</title>
  <link rel="stylesheet" href="/static/css/portal.css">
</head>
<body>
  <div class="portal-bg" aria-hidden="true"></div>

  <main class="status-page">

    <div class="status-icon error" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <h1 class="status-title">{{ title|default('Something went wrong') }}</h1>
    <p class="status-body">{{ message|default('An unexpected error occurred. Please try again.') }}</p>

    <a class="btn-secondary" href="/">Return to Login</a>

    <div style="margin-top: 2.5rem; font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.03em; text-align: center; max-width: 28ch; margin-left: auto; margin-right: auto;">
      If the problem persists, please contact the front desk.
    </div>

  </main>
</body>
</html>
