<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080d1a">
  <title>Connected — {{ hotel_name|default('Hotel WiFi') }}</title>
  <link rel="stylesheet" href="/static/css/portal.css">
</head>
<body>
  <div class="portal-bg" aria-hidden="true"></div>

  <main class="status-page">

    <div class="status-icon success" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1 class="status-title">You're Connected</h1>
    <p class="status-body">Enjoy complimentary WiFi throughout your stay at {{ hotel_name|default('the hotel') }}.</p>

    <!-- Prominent Session Status Card -->
    <div class="session-status-card">
      <div class="session-status-header">
        <div class="session-status-indicator"></div>
        <span class="session-status-label">Online</span>
      </div>

      <div class="session-time-display">
        <span class="session-time-label">Session ends at</span>
        <span class="session-time-value">{{ expires_at.strftime('%H:%M') if expires_at else '—' }}</span>
      </div>

      <div class="session-time-meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Auto-disconnect at session end</span>
      </div>
    </div>

    <!-- Primary Disconnect Button -->
    <button class="btn-disconnect-primary" id="disconnect-btn" onclick="confirmDisconnect(event)">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      <span class="btn-text">Disconnect</span>
    </button>

    <a class="btn-secondary" href="http://detectportal.firefox.com/canonical.html" onclick="window.open(this.href,'_blank');return false;">
      Continue Browsing
    </a>

  </main>

  <style>
    /* ─── Session Status Card ─── */
    .session-status-card {
      margin: 2.5rem auto 0;
      max-width: 340px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.75rem 1.5rem;
      animation: fadeUp 0.5s var(--ease-out-quart) 0.5s both;
    }

    .session-status-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .session-status-indicator {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 oklch(72% 0.14 160 / 0.4); }
      50% { box-shadow: 0 0 0 6px oklch(72% 0.14 160 / 0); }
    }

    .session-status-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--success);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .session-time-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 0;
      margin-bottom: 1rem;
    }

    .session-time-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .session-time-value {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.75rem;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .session-time-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .session-time-meta svg {
      opacity: 0.5;
    }

    /* ─── Disconnect Button ─── */
    .btn-disconnect-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 2rem;
      padding: 1rem 2.5rem;
      background: oklch(65% 0.18 25 / 0.12);
      border: 1px solid oklch(65% 0.18 25 / 0.35);
      border-radius: 14px;
      color: oklch(72% 0.15 25);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s var(--ease-out-quart);
      min-height: 56px;
      animation: fadeUp 0.5s var(--ease-out-quart) 0.65s both;
    }

    .btn-disconnect-primary:hover {
      background: oklch(65% 0.18 25 / 0.22);
      border-color: oklch(65% 0.18 25 / 0.55);
      color: oklch(78% 0.15 25);
      transform: translateY(-1px);
    }

    .btn-disconnect-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-disconnect-primary:focus-visible {
      outline: 2px solid oklch(65% 0.18 25 / 0.5);
      outline-offset: 2px;
    }

    .btn-disconnect-primary.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .btn-disconnect-primary.loading .btn-icon {
      animation: spin 1s linear infinite;
    }

    /* Move Continue Browsing to be secondary */
    .btn-secondary {
      animation-delay: 0.8s;
    }

    @media (prefers-reduced-motion: reduce) {
      .session-status-indicator {
        animation: none;
      }
      .btn-disconnect-primary.loading .btn-icon {
        animation: none;
      }
    }
  </style>

  <script>
    async function confirmDisconnect(e) {
      e.preventDefault();
      if (!confirm('Disconnect from WiFi?')) return;

      const btn = document.getElementById('disconnect-btn');
      const btnText = btn.querySelector('.btn-text');
      const btnIcon = btn.querySelector('.btn-icon');

      btn.classList.add('loading');
      btnText.textContent = 'Disconnecting...';

      // Change icon to spinner
      btnIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>';

      try {
        await fetch('/session/disconnect', { method: 'POST' });
      } finally {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
