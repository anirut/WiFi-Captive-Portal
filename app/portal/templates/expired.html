<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080d1a">
  <title>Session Expired — {{ hotel_name|default('Hotel WiFi') }}</title>
  <link rel="stylesheet" href="/static/css/portal.css">
</head>
<body>
  <div class="portal-bg" aria-hidden="true"></div>

  <main class="status-page">

    <div class="status-icon warning" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>

    <h1 class="status-title">Session Expired</h1>
    <p class="status-body">Your WiFi session has ended. Sign in again to reconnect.</p>

    <a class="btn-secondary" href="/">Sign In Again</a>

    <div style="margin-top: 2.5rem; font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.03em; text-align: center; max-width: 28ch; margin-left: auto; margin-right: auto;">
      If you believe this is an error, please contact the front desk.
    </div>

  </main>
</body>
</html>
