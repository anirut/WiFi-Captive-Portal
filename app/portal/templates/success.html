<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080d1a">
  <title>Connected — {{ hotel_name|default('Hotel WiFi') }}</title>
  <link rel="stylesheet" href="/static/css/portal.css">
</head>
<body>
  <div class="portal-bg" aria-hidden="true"></div>

  <main class="status-page">

    <div class="status-icon success" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1 class="status-title">You're Connected</h1>
    <p class="status-body">Enjoy complimentary WiFi throughout your stay at {{ hotel_name|default('the hotel') }}.</p>

    <div class="session-info-card" id="session-info" style="display:none">
      <div class="session-info-row">
        <span class="label">Session expires</span>
        <span class="value" id="expires-text">—</span>
      </div>
      <div class="session-info-row">
        <span class="label">Status</span>
        <span class="value" style="color: oklch(72% 0.14 160)">Active</span>
      </div>
    </div>

    <a class="btn-secondary" href="http://detectportal.firefox.com/canonical.html" onclick="window.open(this.href,'_blank');return false;">
      Continue Browsing
    </a>

    <div style="margin-top: 3rem; font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.03em;">
      <a href="/session/disconnect" style="color: var(--text-muted); text-decoration: none;" onclick="confirmDisconnect(event)">Disconnect</a>
    </div>

  </main>

  <script>
    // Show session expiry if available in sessionStorage
    const expiresAt = sessionStorage.getItem('session_expires_at');
    if (expiresAt) {
      const d = new Date(expiresAt);
      const formatted = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('expires-text').textContent = formatted + ' today';
      document.getElementById('session-info').style.display = 'block';
    }

    async function confirmDisconnect(e) {
      e.preventDefault();
      if (!confirm('Disconnect from WiFi?')) return;
      try {
        await fetch('/session/disconnect', { method: 'POST' });
      } finally {
        sessionStorage.removeItem('session_expires_at');
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
