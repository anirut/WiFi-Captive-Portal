<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Hotel WiFi Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a2847 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: linear-gradient(135deg, rgba(26, 40, 71, 0.8), rgba(21, 30, 47, 0.8));
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #3b82f6;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-bottom: 32px;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fecaca;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      color: #f1f5f9;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input::placeholder {
      color: #64748b;
    }

    .login-btn {
      width: 100%;
      padding: 10px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">⚡ Hotel WiFi</div>
    <div class="subtitle">Admin Panel</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login{% if request.query_params.get('next') %}?next={{ request.query_params.get('next') }}{% endif %}">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required placeholder="Enter your username"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Enter your password"/>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</body>
</html>
