{% extends "base.html" %}
{% block title %}Brand & Config{% endblock %}
{% block content %}

<div class="page-title">Brand &amp; Configuration</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <!-- Brand Settings -->
  <div class="card">
    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #f1f5f9;">Hotel Settings</h3>
    <form hx-put="/admin/api/brand" hx-target="#brand-result" hx-ext="json-enc" class="space-y-4">
      <div class="form-group">
        <label>Hotel Name</label>
        <input name="hotel_name" type="text" value="{{ brand.hotel_name if brand else 'Hotel WiFi' }}"/>
      </div>
      <div class="form-group">
        <label>Primary Color</label>
        <input name="primary_color" type="color" value="{{ brand.primary_color if brand else '#3B82F6' }}" style="height: 40px;"/>
      </div>
      <div class="form-group">
        <label>Language</label>
        <select name="language">
          <option value="th" {% if brand and brand.language == 'th' %}selected{% endif %}>Thai</option>
          <option value="en" {% if brand and brand.language == 'en' %}selected{% endif %}>English</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-full">Save Settings</button>
    </form>
    <div id="brand-result" style="margin-top: 12px; font-size: 12px; color: #22c55e;"></div>
  </div>

  <!-- Logo Upload -->
  <div class="card">
    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #f1f5f9;">Logo Upload</h3>
    {% if brand and brand.logo_url %}
    <img src="{{ brand.logo_url }}" alt="Current Logo" style="width: 120px; height: 120px; object-fit: contain; margin-bottom: 16px; border-radius: 8px;"/>
    {% endif %}
    <form hx-post="/admin/brand/logo" hx-encoding="multipart/form-data" hx-target="#logo-result" class="space-y-4">
      <div class="form-group">
        <label>Image File</label>
        <input type="file" name="file" accept="image/jpeg,image/png,image/webp"/>
      </div>
      <p style="font-size: 12px; color: #64748b;">Max 2MB — JPEG, PNG, WebP</p>
      <button type="submit" class="btn btn-primary w-full">Upload Logo</button>
    </form>
    <div id="logo-result" style="margin-top: 12px; font-size: 12px; color: #22c55e;"></div>
  </div>

  <!-- T&C Text -->
  <div class="card lg:col-span-2" x-data="{tab:'th'}">
    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #f1f5f9;">Terms &amp; Conditions</h3>
    <div style="display: flex; gap: 12px; margin-bottom: 20px;">
      <button @click="tab='th'" class="btn" :class="tab=='th' ? 'btn-primary' : 'btn-secondary'" style="text-decoration: none;">Thai</button>
      <button @click="tab='en'" class="btn" :class="tab=='en' ? 'btn-primary' : 'btn-secondary'" style="text-decoration: none;">English</button>
    </div>
    <form hx-put="/admin/api/brand" hx-target="#tc-result" hx-ext="json-enc" class="space-y-4">
      <div x-show="tab=='th'" class="form-group">
        <label>Thai T&amp;C</label>
        <textarea name="tc_text_th" rows="8" style="resize: vertical;">{{ brand.tc_text_th if brand and brand.tc_text_th else '' }}</textarea>
      </div>
      <div x-show="tab=='en'" class="form-group">
        <label>English T&amp;C</label>
        <textarea name="tc_text_en" rows="8" style="resize: vertical;">{{ brand.tc_text_en if brand and brand.tc_text_en else '' }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Save T&amp;C</button>
    </form>
    <div id="tc-result" style="margin-top: 12px; font-size: 12px; color: #22c55e;"></div>
  </div>

</div>
{% endblock %}
