{% extends "base.html" %}
{% block title %}Analytics{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}
{% block content %}

<div class="page-title">Analytics</div>

<div style="display: flex; gap: 12px; margin-bottom: 24px;">
  {% for r in ['24h','7d','30d'] %}
  <a href="/admin/analytics?range={{ r }}"
     class="btn {% if range == r %}btn-primary{% else %}btn-secondary{% endif %}"
     style="text-decoration: none;">
    {{ r }}
  </a>
  {% endfor %}
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <div class="card"><canvas id="sessionsChart"></canvas></div>
  <div class="card"><canvas id="bandwidthChart"></canvas></div>
  <div class="card"><canvas id="authChart"></canvas></div>
</div>

<script>
const data = {{ analytics_data | tojson }};
new Chart(document.getElementById('sessionsChart'), {
  type: 'line',
  data: {
    labels: data.sessions_over_time.map(d => d.timestamp.substr(11,5)),
    datasets: [{label: 'Active Sessions', data: data.sessions_over_time.map(d => d.active_sessions),
                borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3}]
  }, options: {plugins:{legend:{labels:{color:'#cbd5e1'}}}, scales:{x:{ticks:{color:'#64748b'}}, y:{ticks:{color:'#64748b'}}}}
});
new Chart(document.getElementById('bandwidthChart'), {
  type: 'bar',
  data: {
    labels: data.bandwidth_per_hour.map(d => d.timestamp.substr(11,5)),
    datasets: [
      {label: 'Down (MB)', data: data.bandwidth_per_hour.map(d => Math.round(d.bytes_down/1048576)), backgroundColor: '#3b82f6'},
      {label: 'Up (MB)', data: data.bandwidth_per_hour.map(d => Math.round(d.bytes_up/1048576)), backgroundColor: '#06b6d4'}
    ]
  }, options: {plugins:{legend:{labels:{color:'#cbd5e1'}}}, scales:{x:{ticks:{color:'#64748b'}}, y:{ticks:{color:'#64748b'}}}}
});
new Chart(document.getElementById('authChart'), {
  type: 'doughnut',
  data: {
    labels: ['Room Auth', 'Voucher Auth'],
    datasets: [{data: [data.auth_breakdown.room_auth, data.auth_breakdown.voucher_auth],
                backgroundColor: ['#3b82f6', '#10b981']}]
  }, options: {plugins:{legend:{labels:{color:'#cbd5e1'}}}}
});
</script>

{% endblock %}
