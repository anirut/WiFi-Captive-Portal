{% extends "base.html" %}
{% block title %}Sessions{% endblock %}
{% block content %}

<div class="page-title">Active Sessions</div>

<div class="card">
  <table id="session-table">
    <thead>
      <tr>
        <th>IP Address</th>
        <th>Room / Voucher</th>
        <th>Connected</th>
        <th>Expires</th>
        <th>Bandwidth</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="session-tbody"
           hx-get="/admin/sessions/rows"
           hx-trigger="every 30s"
           hx-target="#session-tbody"
           hx-swap="outerHTML">
      {% include "sessions_rows.html" %}
    </tbody>
  </table>
</div>

{% endblock %}
