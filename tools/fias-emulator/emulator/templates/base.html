<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Dashboard{% endblock %} — FIAS Emulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
    .gradient-accent { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-indicator { display: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-64 min-h-screen glass flex flex-col p-4 fixed top-0 left-0">
    <div class="mb-8">
      <h1 class="text-xl font-bold gradient-accent bg-clip-text text-transparent">FIAS Emulator</h1>
      <p class="text-xs text-slate-400">Opera PMS Testing</p>
    </div>
    <nav class="flex-1 space-y-1">
      <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 text-sm {% if request.url.path == '/' %}bg-white/10{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        Dashboard
      </a>
      <a href="/pages/guests" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 text-sm {% if 'guests' in request.url.path %}bg-white/10{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        Guests
      </a>
      <a href="/pages/scenarios" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 text-sm {% if 'scenarios' in request.url.path %}bg-white/10{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        Scenarios
      </a>
      <a href="/pages/failure-rules" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 text-sm {% if 'failure-rules' in request.url.path %}bg-white/10{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        Failure Rules
      </a>
      <a href="/pages/connections" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 text-sm {% if 'connections' in request.url.path %}bg-white/10{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
        Connections
      </a>
      <a href="/pages/activity" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 text-sm {% if 'activity' in request.url.path %}bg-white/10{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        Activity Log
      </a>
    </nav>
    <div class="mt-auto pt-4 border-t border-white/10">
      <p class="text-xs text-slate-400 mb-2">FIAS TCP: <span class="text-indigo-400">{{ tcp_port }}</span></p>
      <a href="/docs" target="_blank" class="block text-xs text-slate-400 hover:text-indigo-400 px-3 py-1">API Docs</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 p-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Handle HTMX errors gracefully
    document.body.addEventListener('htmx:responseError', function(evt) {
      console.error('HTMX Error:', evt.detail);
    });
  </script>
</body>
</html>
